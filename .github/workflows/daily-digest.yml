name: Daily Digest

on:
  schedule:
    - cron: '0 7 * * *'    # 7:00 AM UTC
    - cron: '0 18 * * *'   # 6:00 PM UTC
  workflow_dispatch:         # Manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: ai-digest-reader/package-lock.json

      - name: Install frontend deps
        run: cd ai-digest-reader && npm ci

      - name: Generate digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
        run: python digest.py

      - name: Copy digest to frontend
        run: |
          TODAY=$(date '+%Y-%m-%d')
          cp "output/$TODAY/digest.json" ai-digest-reader/public/data/digest.json

      - name: Build frontend
        run: cd ai-digest-reader && npm run build

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-digest-reader/public/data/digest.json
          git diff --cached --quiet || git commit -m "chore: auto-update digest $(date '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push

      - name: Deploy to Vercel (optional)
        if: ${{ env.VERCEL_TOKEN != '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          cd ai-digest-reader && vercel --prod --token=$VERCEL_TOKEN
