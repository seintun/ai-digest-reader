<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – AI Digest</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .card {
      max-width: 400px;
      background: rgba(30,41,59,0.8);
      border: 1px solid rgba(71,85,105,0.5);
      border-radius: 1.5rem;
      padding: 3rem 2rem;
    }
    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 1.5rem;
      background: rgba(99,102,241,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; color: #f8fafc; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 1.5rem; }
    a {
      display: inline-block;
      background: #6366f1;
      color: white;
      padding: 0.625rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="32" height="32" fill="none" stroke="#6366f1" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M12 12h.01M8.464 15.536a5 5 0 010-7.072M5.636 18.364a9 9 0 010-12.728" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>AI Digest needs a connection to load the latest stories. Connect to the internet and try again.</p>
    <a href="/">Try Again</a>
  </div>
</body>
</html>
